services:
  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: always

  postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=ticketing_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

  api:
    build: .
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    restart: always
    environment:
      - REDIS_HOST=redis
      - DATABASE_URL=postgresql://user:password@postgres/ticketing_db
      - SMTP_EMAIL=abcd3795573@gmail.com
      - SMTP_PASSWORD=pslqycrnlpjjhjhe
    depends_on:
      - redis
      - postgres
    volumes:
      - .:/app  # 讓本機修改能即時熱更新

  celery_worker:
    build: .
    command: celery -A tasks.celery_config worker --loglevel=info
    restart: always
    environment:
      - REDIS_HOST=redis
      - DATABASE_URL=postgresql://user:password@postgres/ticketing_db
      - SMTP_EMAIL=abcd3795573@gmail.com
      - SMTP_PASSWORD=pslqycrnlpjjhjhe
    depends_on:
      - redis
      - postgres
    volumes:
      - .:/app

  celery_beat:
    build: .
    command: celery -A tasks.celery_config beat --loglevel=info
    restart: always
    environment:
      - REDIS_HOST=redis
      - DATABASE_URL=postgresql://user:password@postgres/ticketing_db
      - SMTP_EMAIL=abcd3795573@gmail.com
      - SMTP_PASSWORD=pslqycrnlpjjhjhe

    depends_on:
      - redis
      - postgres
    volumes:
      - .:/app

  frontend:
    build: ./frontend
    ports:
      - "5179:5173" # 🎯 換上全新 Port，徹底避開瀏覽器終極快取
    environment:
      - CHOKIDAR_USEPOLLING=true # 幫助在 Docker 中正確觸發熱更新
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules

volumes:
  postgres_data:
  redis_data:
  frontend_node_modules: